<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Collaborator</title>
	<link rel="stylesheet" href="./src/shell.css" />
</head>

<body>
	<div id="titlebar"></div>

	<button type="button" id="nav-toggle" class="panel-toggle" aria-pressed="true" aria-label="Hide Navigator"
		title="Hide Navigator"></button>

	<div id="panels">
		<div id="panel-nav">
			<div id="nav-toolbar">
				<button type="button" id="update-pill" style="display: none;"></button>
				<div id="workspace-dropdown-row">
					<div id="workspace-dropdown">
						<button type="button" id="workspace-trigger">
							<span id="workspace-trigger-label"><span id="workspace-trigger-parent"></span><span
									id="workspace-trigger-name">No workspace</span></span>
							<svg class="dropdown-caret" width="12" height="12" viewBox="0 0 24 24" fill="none"
								stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
								<polyline points="6 9 12 15 18 9" />
							</svg>
						</button>
						<div id="workspace-menu" class="hidden">
							<div id="workspace-menu-items"></div>
							<button type="button" class="dropdown-item dropdown-item-add" id="ws-add-option">
								+ Add workspace&#x2026;
							</button>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div id="nav-resize" class="resize-handle" data-panel="nav"></div>
		<div id="panel-viewer">
			<canvas id="grid-canvas"></canvas>
			<div id="zone-layer"></div>
			<div id="group-layer"></div>
			<svg id="connection-layer" xmlns="http://www.w3.org/2000/svg"></svg>
			<div id="tile-layer"></div>
			<div id="edge-indicators"></div>
			<div id="zoom-indicator">100%</div>
			<div id="zoom-controls">
				<button type="button" id="zoom-fit-btn" title="Show all zones">All</button>
				<button type="button" id="zoom-out-btn" title="Zoom out">−</button>
				<button type="button" id="zoom-reset-btn" title="Reset to 100%">100%</button>
				<button type="button" id="zoom-in-btn" title="Zoom in">+</button>
			</div>
			<div id="canvas-context-menu"></div>
		</div>
	</div>

	<div id="settings-overlay">
		<div id="settings-backdrop"></div>
		<div id="settings-modal"></div>
	</div>

	<div id="canvas-skill-dialog" class="hidden">
		<div id="canvas-skill-backdrop"></div>
		<div id="canvas-skill-modal">
			<h2>Canvas Skill for AI Agents</h2>
			<p>Collaborator can install a canvas skill for your AI coding agents, letting them arrange tiles on your workspace.</p>
			<div id="canvas-skill-agents"></div>
			<div id="canvas-skill-actions">
				<button type="button" id="canvas-skill-skip">Skip</button>
				<button type="button" id="canvas-skill-install">Install</button>
			</div>
		</div>
	</div>

	<div id="canvas-empty-hint">Right-click to add tiles &nbsp;|&nbsp; Double-click for terminal &nbsp;|&nbsp; ? for shortcuts</div>

	<div id="pen-dock" class="pen-dock">
		<button type="button" class="pen-dock-icon pen-dock-active" id="tool-pointer-btn" data-tool="pointer" data-tooltip="Pointer (V)">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l14 14-5 0-3 5-2-7z"/></svg>
		</button>
		<button type="button" class="pen-dock-icon" id="tool-terminal-btn" data-tool="terminal" data-tooltip="Terminal (T)">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="18" rx="2"/><polyline points="7 9 10 12 7 15"/><line x1="13" y1="15" x2="17" y2="15"/></svg>
		</button>
		<button type="button" class="pen-dock-icon" id="tool-sticky-btn" data-tool="sticky" data-tooltip="Sticky Note (N)">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M15 3v6h6"/><path d="M15 9L21 3" stroke="none"/><path d="M14 21V15a1 1 0 011-1h6" fill="currentColor" opacity="0.15" stroke="none"/><path d="M14 21V15a1 1 0 011-1h6"/><line x1="7" y1="8" x2="13" y2="8" opacity="0.5"/><line x1="7" y1="11" x2="11" y2="11" opacity="0.5"/></svg>
		</button>
		<button type="button" class="pen-dock-icon" id="tool-browser-btn" data-tool="browser" data-tooltip="Browser (W)">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 014 10 15 15 0 01-4 10 15 15 0 01-4-10 15 15 0 014-10z"/></svg>
		</button>
		<button type="button" class="pen-dock-icon" id="tool-shape-btn" data-tool="shape" data-tooltip="Shape (S)">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="12" cy="12" r="4" opacity="0.4"/></svg>
		</button>
		<div class="pen-dock-separator"></div>
		<button type="button" class="pen-dock-icon" id="pen-brush-btn" data-tool="brush" data-tooltip="Pen (P)">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
		</button>
		<button type="button" class="pen-dock-icon" id="pen-eraser-btn" data-tool="eraser" data-tooltip="Eraser (E)">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14.6 1.6c.8-.8 2-.8 2.8 0l5 5c.8.8.8 2 0 2.8L12 20"/><path d="M6 12l5 5"/></svg>
		</button>
		<button type="button" class="pen-dock-icon" id="tool-layout-btn" data-tool="layout" data-tooltip="Auto Layout (Cmd+Shift+A)">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
		</button>
		<div class="pen-dock-separator"></div>
		<select id="launch-tool-select" class="dock-select">
			<option value="claude">Claude Code (YOLO)</option>
			<option value="codex">Codex</option>
			<option value="custom">custom...</option>
		</select>
		<input type="text" id="launch-custom-cmd" class="dock-input" placeholder="command" style="display:none" />
		<button type="button" class="pen-dock-icon dock-launch-icon" id="launch-all-btn" data-tooltip="Launch All (Cmd+Shift+L)">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
		</button>
		<button type="button" class="pen-dock-icon dock-scratchpad-icon" id="tool-scratchpad-btn" data-tooltip="Memo (M)">
			<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
		</button>
		<button type="button" class="pen-dock-icon dock-help-icon" id="help-shortcut-btn" data-tooltip="Shortcuts (?)">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9 9a3 3 0 015.12 1c0 2-3.12 2.5-3.12 4"/><circle cx="12" cy="17" r="0.5" fill="currentColor"/></svg>
		</button>
		<div class="pen-dock-expand" id="pen-dock-expand">
			<div class="pen-dock-separator"></div>
			<div class="draw-color-swatch draw-color-active" data-pen-color="#ffffff" style="background:#ffffff" title="White"></div>
			<div class="draw-color-swatch" data-pen-color="#222222" style="background:#222222" title="Black"></div>
			<div class="draw-color-swatch" data-pen-color="#ef4444" style="background:#ef4444" title="Red"></div>
			<div class="draw-color-swatch" data-pen-color="#3b82f6" style="background:#3b82f6" title="Blue"></div>
			<div class="draw-color-swatch" data-pen-color="#22c55e" style="background:#22c55e" title="Green"></div>
			<div class="draw-color-swatch" data-pen-color="#eab308" style="background:#eab308" title="Yellow"></div>
			<div class="pen-dock-separator"></div>
			<button type="button" class="draw-size-btn" data-pen-size="2">S</button>
			<button type="button" class="draw-size-btn draw-size-active" data-pen-size="5">M</button>
			<button type="button" class="draw-size-btn" data-pen-size="12">L</button>
			<div class="pen-dock-separator"></div>
			<button type="button" class="pen-undo-btn" id="pen-undo-btn" title="Undo (Cmd+Z)">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
			</button>
			<button type="button" class="draw-clear-btn" id="pen-clear-btn" title="Clear all">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
			</button>
		</div>
	</div>

	<div id="shortcut-modal" class="shortcut-modal-overlay">
		<div class="shortcut-modal">
			<div class="shortcut-modal-header">
				<span>Keyboard Shortcuts</span>
				<button class="shortcut-modal-close">&times;</button>
			</div>
			<div class="shortcut-modal-body"></div>
		</div>
	</div>

	<div id="resize-overlay"></div>

	<div id="loading-overlay">
		<div id="loading-spinner"></div>
		<div id="loading-status">Initializing&#x2026;</div>
	</div>

	<div id="scratchpad-overlay">
		<div id="scratchpad-backdrop"></div>
		<div id="scratchpad-modal">
			<div id="scratchpad-header">
				<span>Memo</span>
				<button type="button" id="scratchpad-close">&times;</button>
			</div>
			<div id="scratchpad-main">
				<div id="scratchpad-left">
				<div id="scratchpad-content">
					<div id="scratchpad-toolbar">
						<button type="button" class="sp-fmt-btn" data-cmd="bold" title="Bold (Cmd+B)"><b>B</b></button>
						<button type="button" class="sp-fmt-btn" data-cmd="italic" title="Italic (Cmd+I)"><i>I</i></button>
						<button type="button" class="sp-fmt-btn" data-cmd="heading" title="Heading">H</button>
						<button type="button" class="sp-fmt-btn" data-cmd="insertUnorderedList" title="List">•</button>
						<button type="button" class="sp-fmt-btn" data-cmd="code" title="Code">&lt;&gt;</button>
						<button type="button" class="sp-fmt-btn" data-cmd="timestamp" title="Insert timestamp">⏱</button>
						<span class="scratchpad-separator"></span>
						<button type="button" class="scratchpad-tool-btn scratchpad-tool-active" data-tool="text" title="Text">T</button>
						<button type="button" class="scratchpad-tool-btn" data-tool="pen" title="Pen">P</button>
						<button type="button" class="scratchpad-tool-btn" data-tool="eraser" title="Eraser">E</button>
						<span class="scratchpad-separator"></span>
						<div id="sp-pen-colors">
							<div class="sp-color-dot sp-color-active" data-color="#ffffff" style="background:#ffffff" title="White"></div>
							<div class="sp-color-dot" data-color="#ef4444" style="background:#ef4444" title="Red"></div>
							<div class="sp-color-dot" data-color="#3b82f6" style="background:#3b82f6" title="Blue"></div>
							<div class="sp-color-dot" data-color="#22c55e" style="background:#22c55e" title="Green"></div>
							<div class="sp-color-dot" data-color="#eab308" style="background:#eab308" title="Yellow"></div>
						</div>
						<span class="scratchpad-separator"></span>
						<button type="button" class="scratchpad-tool-btn" data-tool="clear-drawing" title="Clear drawing">Clear</button>
					</div>
					<div id="scratchpad-body">
						<canvas id="scratchpad-canvas"></canvas>
						<div id="scratchpad-editor" contenteditable="true" spellcheck="true"></div>
					</div>
					<div id="scratchpad-footer">
						<span id="scratchpad-wordcount">0 words</span>
						<div id="scratchpad-footer-actions">
							<button type="button" id="scratchpad-copy" title="Copy memo">Copy</button>
							<button type="button" id="scratchpad-send-canvas" title="Send to canvas as sticky note">→ Canvas</button>
						</div>
					</div>
				</div>
				</div>
				<div id="scratchpad-right">
					<div id="kanban-board"></div>
				</div>
			</div>
		</div>
	</div>

	<script type="module" src="./src/renderer.js"></script>
</body>

</html>
