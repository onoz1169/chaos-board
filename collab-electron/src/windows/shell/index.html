<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Collaborator</title>
	<link rel="stylesheet" href="./src/shell.css" />
</head>

<body>
	<div id="titlebar"></div>
	<span id="alpha-label">COLLABORATOR ALPHA &#x2022; BEWARE BUGS <a
			href="https://github.com/collaborator-ai/collab-public/issues/new" target="_blank">[<span>CREATE ISSUE</span>]</a></span>

	<button type="button" id="nav-toggle" class="panel-toggle" aria-pressed="true" aria-label="Hide Navigator"
		title="Hide Navigator"></button>

	<div id="panels">
		<div id="panel-nav">
			<div id="nav-toolbar">
				<button type="button" id="update-pill" style="display: none;"></button>
				<div id="workspace-dropdown-row">
					<div id="workspace-dropdown">
						<button type="button" id="workspace-trigger">
							<span id="workspace-trigger-label"><span id="workspace-trigger-parent"></span><span
									id="workspace-trigger-name">No workspace</span></span>
							<svg class="dropdown-caret" width="12" height="12" viewBox="0 0 24 24" fill="none"
								stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
								<polyline points="6 9 12 15 18 9" />
							</svg>
						</button>
						<div id="workspace-menu" class="hidden">
							<div id="workspace-menu-items"></div>
							<button type="button" class="dropdown-item dropdown-item-add" id="ws-add-option">
								+ Add workspace&#x2026;
							</button>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div id="nav-resize" class="resize-handle" data-panel="nav"></div>
		<div id="panel-viewer">
			<canvas id="grid-canvas"></canvas>
			<div id="tile-layer"></div>
			<div id="edge-indicators"></div>
			<div id="zoom-indicator">100%</div>
		</div>
	</div>

	<div id="settings-overlay">
		<div id="settings-backdrop"></div>
		<div id="settings-modal"></div>
	</div>

	<div id="canvas-skill-dialog" class="hidden">
		<div id="canvas-skill-backdrop"></div>
		<div id="canvas-skill-modal">
			<h2>Canvas Skill for AI Agents</h2>
			<p>Collaborator can install a canvas skill for your AI coding agents, letting them arrange tiles on your workspace.</p>
			<div id="canvas-skill-agents"></div>
			<div id="canvas-skill-actions">
				<button type="button" id="canvas-skill-skip">Skip</button>
				<button type="button" id="canvas-skill-install">Install</button>
			</div>
		</div>
	</div>

	<div id="launch-toolbar">
		<select id="launch-tool-select">
			<option value="claude">claude</option>
			<option value="gemini">gemini</option>
			<option value="custom">custom...</option>
		</select>
		<input type="text" id="launch-custom-cmd" placeholder="command" style="display:none" />
		<button type="button" id="launch-all-btn" title="Send command to all terminal tiles (Cmd+Shift+L)">&#9889; Launch All</button>
	</div>

	<div id="resize-overlay"></div>

	<div id="loading-overlay">
		<div id="loading-spinner"></div>
		<div id="loading-status">Initializing&#x2026;</div>
	</div>

	<script type="module" src="./src/renderer.js"></script>
</body>

</html>
